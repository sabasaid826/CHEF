services:
  - type: web
    name: chef-app
    env: python
    buildCommand: "./build.sh"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
      - key: DEBUG
        value: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false # You will need to add this manually in the dashboard
